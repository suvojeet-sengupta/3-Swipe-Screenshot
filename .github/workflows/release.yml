name: Create Release and Upload Zip

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Zip Archive
        run: |
          # Read module id and version from module.prop
          MODULE_ID=$(grep "^id=" module.prop | cut -d'=' -f2)
          VERSION=$(grep "^version=" module.prop | cut -d'=' -f2)
          ZIP_NAME="${MODULE_ID}-${VERSION}.zip"
          
          # Remove any existing zip to avoid zipping it inside itself
          rm -f *.zip
          
          # Zip all files excluding .git, .github, etc.
          zip -r "$ZIP_NAME" . -x "*.git*" "*.github*" "*.gitattributes" "swipetoscreenshot.zip"
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ env.VERSION }}
          body: "Automatically generated Magisk module zip for ${{ env.VERSION }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
